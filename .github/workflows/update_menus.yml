name: Menuplan aktualisieren

on:
  schedule:
    - cron: "30 7 * * 1"
    - cron: "0 8 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Tesseract OCR installieren
        run: sudo apt-get install -y tesseract-ocr tesseract-ocr-deu

      - name: Abhaengigkeiten installieren
        run: pip install requests beautifulsoup4 pdfplumber lxml pytesseract pillow

      - name: Menues scrapen
        run: python scripts/update_menus.py

      - name: menus.json committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update menus.json"
          file_pattern: menus.json
