<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mittagsmenü – 1160 Wien</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #F5F1EB;
      --surface:   #FFFFFF;
      --green:     #2C5F2E;
      --green-lt:  #EAF2EA;
      --amber:     #D4861C;
      --amber-lt:  #FEF3E2;
      --text:      #1C1C1C;
      --muted:     #6B6766;
      --border:    #E3DDD5;
      --today-bg:  #FFF8ED;
      --today-border: #D4861C;
      --radius:    14px;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────── */
    .site-header {
      background: var(--green);
      color: #fff;
      padding: 28px 24px 24px;
      text-align: center;
    }
    .site-header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    .site-header .meta {
      font-size: .875rem;
      opacity: .8;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .badge-week {
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 3px 12px;
      font-weight: 600;
      letter-spacing: .03em;
    }

    /* ── TODAY BANNER ──────────────────────── */
    .today-banner {
      background: var(--amber-lt);
      border-bottom: 2px solid var(--amber);
      padding: 10px 24px;
      text-align: center;
      font-size: .875rem;
      color: var(--amber);
      font-weight: 600;
    }

    /* ── GRID ───────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      padding: 28px 20px 48px;
      max-width: 1300px;
      margin: 0 auto;
    }

    /* ── CARD ───────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-header .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .card-header h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.25rem;
      line-height: 1.25;
    }
    .card-header h2 a {
      color: var(--text);
      text-decoration: none;
    }
    .card-header h2 a:hover { color: var(--green); }

    .cuisine-badge {
      white-space: nowrap;
      background: var(--green-lt);
      color: var(--green);
      font-size: .72rem;
      font-weight: 600;
      border-radius: 20px;
      padding: 3px 10px;
      flex-shrink: 0;
    }

    .card-address {
      margin-top: 6px;
      font-size: .8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .week-chip {
      display: inline-block;
      margin-top: 6px;
      background: var(--border);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: .72rem;
      color: var(--muted);
    }

    /* ── DAYS ───────────────────────────────── */
    .card-days {
      padding: 14px 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .day-block {
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      transition: border-color .15s;
    }
    .day-block.is-today {
      background: var(--today-bg);
      border-color: var(--today-border);
    }

    .day-name {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .day-block.is-today .day-name { color: var(--amber); }
    .today-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--amber);
    }

    .menu-items { display: flex; flex-direction: column; gap: 4px; }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      font-size: .875rem;
      line-height: 1.4;
    }
    .menu-item .dish { flex: 1; }
    .menu-item .price {
      font-weight: 600;
      color: var(--green);
      white-space: nowrap;
      font-size: .82rem;
    }

    .price-note {
      margin-top: 4px;
      font-size: .75rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── IMAGE CARD (Klaghofer) ─────────────── */
    .menu-image-wrap {
      padding: 14px 20px 18px;
    }
    .menu-image-wrap img {
      width: 100%;
      border-radius: 8px;
      display: block;
      border: 1px solid var(--border);
    }

    /* ── EMPTY STATE ────────────────────────── */
    .empty-state {
      padding: 24px 20px;
      text-align: center;
      color: var(--muted);
      font-size: .875rem;
    }
    .empty-state svg {
      margin: 0 auto 8px;
      display: block;
      opacity: .4;
    }

    /* ── LOADING ────────────────────────────── */
    #loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 1.1rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR ──────────────────────────────── */
    #error-msg {
      display: none;
      background: #fff3f3;
      border: 1px solid #f5a0a0;
      border-radius: 10px;
      padding: 20px;
      margin: 40px auto;
      max-width: 500px;
      text-align: center;
      color: #c0392b;
    }

    /* ── FOOTER ─────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: .8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--green); }

    /* ── RESPONSIVE ─────────────────────────── */
    @media (max-width: 480px) {
      .grid { padding: 16px 12px 40px; gap: 14px; }
      .card-header { padding: 14px 16px 12px; }
      .card-days { padding: 12px 16px 16px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1>🍽&nbsp;Mittagsmenü</h1>
  <div class="meta">
    <span class="badge-week" id="week-badge">KW –</span>
    <span id="updated-label">Wird geladen …</span>
  </div>
</header>

<div class="today-banner" id="today-banner" style="display:none"></div>

<div id="loading">
  <div class="spinner"></div>
  Menüplan wird geladen …
</div>

<div id="error-msg">
  ❌ Menüplan konnte nicht geladen werden.<br />
  Bitte Seite neu laden oder später nochmal versuchen.
</div>

<main class="grid" id="restaurants" style="display:none"></main>

<footer>
  Menüdaten werden jeden Montag automatisch aktualisiert. ·
  <a href="https://github.com" target="_blank" rel="noopener">Quellcode</a>
</footer>

<script>
const DAY_ORDER = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const DAY_SHORT  = ["So","Mo","Di","Mi","Do","Fr","Sa"]; // index = getDay()

function todayDayName() {
  return DAY_ORDER[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1] ?? "";
}

function formatUpdated(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString("de-AT", {
      weekday: "short", day: "numeric", month: "long",
      hour: "2-digit", minute: "2-digit"
    });
  } catch { return iso; }
}

function buildCard(r, today) {
  const hasDays   = r.days && r.days.length > 0;
  const hasImage  = r.menu_image;

  // ── Header ──────────────────────────────
  const weekChip = r.week_label
    ? `<span class="week-chip">📅 ${r.week_label}</span>`
    : "";

  const priceNote = r.price_note
    ? `<span class="week-chip" style="background:var(--green-lt);color:var(--green)">💶 ${r.price_note}</span>`
    : "";

  const phone = r.phone
    ? `&nbsp;·&nbsp;<a href="tel:${r.phone}" style="color:var(--muted);text-decoration:none">${r.phone}</a>`
    : "";

  const headerHtml = `
    <div class="card-header">
      <div class="top-row">
        <h2><a href="${r.url}" target="_blank" rel="noopener">${r.name}</a></h2>
        <span class="cuisine-badge">${r.cuisine}</span>
      </div>
      <div class="card-address">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        ${r.address}${phone}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
        ${weekChip}${priceNote}
      </div>
    </div>`;

  // ── Body ─────────────────────────────────
  let bodyHtml = "";

  if (hasImage) {
    bodyHtml = `
      <div class="menu-image-wrap">
        <img src="${r.menu_image}" alt="Menükarte ${r.name}" loading="lazy" />
      </div>`;
  } else if (hasDays) {
    // Sort days by canonical order
    const sorted = [...r.days].sort((a, b) =>
      DAY_ORDER.indexOf(a.day) - DAY_ORDER.indexOf(b.day)
    );

    const dayBlocks = sorted.map(d => {
      const isToday = d.day === today;
      const todayDot = isToday ? `<span class="today-dot"></span>Heute` : d.day;

      const items = d.items.map(item => {
        const price = item.price
          ? `<span class="price">${item.price}</span>`
          : "";
        return `<div class="menu-item"><span class="dish">${item.name}</span>${price}</div>`;
      }).join("");

      return `
        <div class="day-block${isToday ? " is-today" : ""}">
          <div class="day-name">${isToday ? '<span class="today-dot"></span>' : ""}${d.day}</div>
          <div class="menu-items">${items}</div>
        </div>`;
    }).join("");

    bodyHtml = `<div class="card-days">${dayBlocks}</div>`;
  } else {
    bodyHtml = `
      <div class="empty-state">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
        </svg>
        Menüplan noch nicht verfügbar.<br />
        Bitte direkt auf der <a href="${r.url}" target="_blank" rel="noopener">Website nachsehen</a>.
      </div>`;
  }

  return `<article class="card" id="card-${r.id}">${headerHtml}${bodyHtml}</article>`;
}

async function init() {
  const loading   = document.getElementById("loading");
  const errorMsg  = document.getElementById("error-msg");
  const container = document.getElementById("restaurants");
  const weekBadge = document.getElementById("week-badge");
  const updLabel  = document.getElementById("updated-label");
  const todayBanner = document.getElementById("today-banner");

  try {
    const res  = await fetch("menus.json?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    const today = todayDayName();

    // Header meta
    weekBadge.textContent = data.week || "KW –";
    updLabel.textContent  = "Aktualisiert: " + formatUpdated(data.updated);

    // Today banner
    const dateStr = new Date().toLocaleDateString("de-AT", {weekday:"long", day:"numeric", month:"long"});
    todayBanner.textContent = `📅 Heute ist ${dateStr}`;
    todayBanner.style.display = "block";

    // Cards
    container.innerHTML = data.restaurants
      .map(r => buildCard(r, today))
      .join("");

    loading.style.display   = "none";
    container.style.display = "grid";

  } catch (err) {
    console.error(err);
    loading.style.display  = "none";
    errorMsg.style.display = "block";
  }
}

init();
</script>
</body>
</html>
