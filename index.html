<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mittagsmenü – 1160 Wien</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    :root {
      --bg:        #F5F1EB;
      --surface:   #FFFFFF;
      --green:     #2C5F2E;
      --green-lt:  #EAF2EA;
      --amber:     #D4861C;
      --amber-lt:  #FEF3E2;
      --text:      #1C1C1C;
      --muted:     #6B6766;
      --border:    #E3DDD5;
      --today-bg:  #FFF8ED;
      --today-border: #D4861C;
      --radius:    14px;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────── */
    .site-header {
      background: var(--green);
      color: #fff;
      padding: 28px 24px 24px;
      text-align: center;
    }
    .site-header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    .site-header .meta {
      font-size: .875rem;
      opacity: .8;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .badge-week {
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 3px 12px;
      font-weight: 600;
      letter-spacing: .03em;
    }

    /* ── TODAY BANNER ──────────────────────── */
    .today-banner {
      background: var(--amber-lt);
      border-bottom: 2px solid var(--amber);
      padding: 10px 24px;
      text-align: center;
      font-size: .875rem;
      color: var(--amber);
      font-weight: 600;
    }

    /* ── GRID ───────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      padding: 28px 20px 48px;
      max-width: 1300px;
      margin: 0 auto;
    }

    /* ── CARD ───────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-header .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .card-header h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.25rem;
      line-height: 1.25;
    }
    .card-header h2 a {
      color: var(--text);
      text-decoration: none;
    }
    .card-header h2 a:hover { color: var(--green); }

    .cuisine-badge {
      white-space: nowrap;
      background: var(--green-lt);
      color: var(--green);
      font-size: .72rem;
      font-weight: 600;
      border-radius: 20px;
      padding: 3px 10px;
      flex-shrink: 0;
    }

    .card-address {
      margin-top: 6px;
      font-size: .8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .week-chip {
      display: inline-block;
      margin-top: 6px;
      background: var(--border);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: .72rem;
      color: var(--muted);
    }

    /* ── DAYS ───────────────────────────────── */
    .card-days {
      padding: 14px 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .day-block {
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      transition: border-color .15s;
    }
    .day-block.is-today {
      background: var(--today-bg);
      border-color: var(--today-border);
    }

    .day-name {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .day-block.is-today .day-name { color: var(--amber); }
    .today-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--amber);
    }

    .menu-items { display: flex; flex-direction: column; gap: 4px; }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      font-size: .875rem;
      line-height: 1.4;
    }
    .menu-item .dish { flex: 1; }
    .menu-item .price {
      font-weight: 600;
      color: var(--green);
      white-space: nowrap;
      font-size: .82rem;
    }

    .price-note {
      margin-top: 4px;
      font-size: .75rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── IMAGE CARD (Klaghofer) ─────────────── */
    .menu-image-wrap {
      padding: 14px 20px 18px;
    }
    .menu-image-wrap img {
      width: 100%;
      border-radius: 8px;
      display: block;
      border: 1px solid var(--border);
    }

    /* ── PDF CARD (NIGLS) ───────────────────── */
    .menu-pdf-wrap {
      padding: 14px 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .menu-pdf-embed {
      width: 100%;
      height: 480px;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: block;
    }
    .menu-pdf-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green-lt);
      color: var(--green);
      font-weight: 600;
      font-size: .85rem;
      border-radius: 8px;
      padding: 8px 14px;
      text-decoration: none;
      align-self: flex-start;
    }
    .menu-pdf-link:hover { background: var(--green); color: #fff; }

    /* ── EMPTY STATE ────────────────────────── */
    .empty-state {
      padding: 24px 20px;
      text-align: center;
      color: var(--muted);
      font-size: .875rem;
    }
    .empty-state svg {
      margin: 0 auto 8px;
      display: block;
      opacity: .4;
    }

    /* ── MAP CARD ───────────────────────────── */
    .card--map {
      grid-column: 1 / -1;
    }
    .map-body {
      display: flex;
      min-height: 360px;
    }
    #map {
      flex: 1;
      min-height: 360px;
      z-index: 0;
    }
    .walktime-list {
      width: 230px;
      flex-shrink: 0;
      padding: 16px 18px;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .walktime-list-title {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .walktime-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }
    .walktime-row:last-child { border-bottom: none; }
    .walktime-name { color: var(--text); flex: 1; line-height: 1.3; }
    .walktime-val {
      font-weight: 600;
      color: var(--green);
      white-space: nowrap;
      font-size: .82rem;
      min-width: 48px;
      text-align: right;
    }
    .walktime-val.loading { color: var(--muted); font-weight: 400; }

    /* Leaflet marker override */
    .map-pin {
      background: var(--green);
      color: #fff;
      border-radius: 20px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,.35);
      line-height: 1.4;
      border: 2px solid #fff;
    }
    .map-pin.is-home {
      background: var(--amber);
    }

    /* ── LOADING ────────────────────────────── */
    #loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 1.1rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR ──────────────────────────────── */
    #error-msg {
      display: none;
      background: #fff3f3;
      border: 1px solid #f5a0a0;
      border-radius: 10px;
      padding: 20px;
      margin: 40px auto;
      max-width: 500px;
      text-align: center;
      color: #c0392b;
    }

    /* ── FOOTER ─────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: .8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--green); }

    /* ── RESPONSIVE ─────────────────────────── */
    @media (max-width: 700px) {
      .map-body { flex-direction: column; }
      #map { min-height: 260px; }
      .walktime-list {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0;
        padding: 12px 16px;
      }
      .walktime-list-title { width: 100%; margin-bottom: 8px; }
      .walktime-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        padding: 8px 12px 8px 0;
        border-bottom: none;
        width: 50%;
      }
      .walktime-val { text-align: left; }
    }
    @media (max-width: 480px) {
      .grid { padding: 16px 12px 40px; gap: 14px; }
      .card-header { padding: 14px 16px 12px; }
      .card-days { padding: 12px 16px 16px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1>🍽&nbsp;Mittagsmenü</h1>
  <div class="meta">
    <span class="badge-week" id="week-badge">KW –</span>
    <span id="updated-label">Wird geladen …</span>
  </div>
</header>

<div class="today-banner" id="today-banner" style="display:none"></div>

<div id="loading">
  <div class="spinner"></div>
  Menüplan wird geladen …
</div>

<div id="error-msg">
  ❌ Menüplan konnte nicht geladen werden.<br />
  Bitte Seite neu laden oder später nochmal versuchen.
</div>

<main class="grid" id="restaurants" style="display:none"></main>

<footer>
  Menüdaten werden jeden Montag automatisch aktualisiert. ·
  <a href="https://github.com" target="_blank" rel="noopener">Quellcode</a>
</footer>

<script>
const DAY_ORDER = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

// ── Koordinaten ──────────────────────────────
const HOME = { lat: 48.2107484, lon: 16.3146618 }; // Hasnerstraße 123, 1160 Wien

const COORDS = {
  "ottakringer-stubn": [48.2135743, 16.3180030],  // Ottakringerstraße 152
  "goesser-braeu":     [48.2120838, 16.3140795],  // Thaliastraße 125A
  "wolfsberger":       [48.2161410, 16.3143023],  // Lienfeldergasse 35
  "klaghofer":         [48.2108755, 16.3052411],  // Rankgasse 25
  "nigls":             [48.2111394, 16.3048215],  // Rankgasse 36
  "casa-mora":         [48.2087942, 16.3168854],  // Possingergasse 59-61
};

// ── Gehzeit via OSRM ─────────────────────────
async function fetchWalkMins(toLat, toLon) {
  try {
    const url = `https://routing.openstreetmap.de/routed-foot/route/v1/foot/` +
      `${HOME.lon},${HOME.lat};${toLon},${toLat}?overview=false`;
    const res = await fetch(url);
    const d   = await res.json();
    return Math.round(d.routes[0].duration / 60);
  } catch { return null; }
}

// ── Karten-Kachel ────────────────────────────
function buildMapCard(restaurants) {
  const rows = restaurants.map(r => `
    <div class="walktime-row">
      <span class="walktime-name">${r.name}</span>
      <span class="walktime-val loading" id="wt-${r.id}">…</span>
    </div>`).join("");

  return `
    <article class="card card--map">
      <div class="card-header">
        <div class="top-row">
          <h2>📍 Karte &amp; Gehzeiten</h2>
          <span class="cuisine-badge">ab Hasnerstraße 123</span>
        </div>
        <div class="card-address">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
          Fußweg ab Hasnerstraße 123, 1160 Wien
        </div>
      </div>
      <div class="map-body">
        <div id="map"></div>
        <div class="walktime-list">
          <div class="walktime-list-title">🚶 Gehminuten</div>
          ${rows}
        </div>
      </div>
    </article>`;
}

async function initMap(restaurants) {
  const map = L.map("map", { scrollWheelZoom: false })
    .setView([HOME.lat, HOME.lon], 14);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  // Startpunkt-Marker
  const homeIcon = L.divIcon({
    html: `<div class="map-pin is-home">🏠 Start</div>`,
    iconSize: null, iconAnchor: [30, 14], className: "",
  });
  L.marker([HOME.lat, HOME.lon], { icon: homeIcon })
    .addTo(map)
    .bindPopup("<b>Hasnerstraße 123</b><br/>1160 Wien");

  // Restaurant-Marker + Gehzeiten laden
  const bounds = [[HOME.lat, HOME.lon]];

  for (const r of restaurants) {
    const coords = COORDS[r.id];
    if (!coords) continue;
    bounds.push(coords);

    const mins = await fetchWalkMins(coords[0], coords[1]);
    const label = mins !== null ? `🚶 ${mins} min` : r.name;

    // Marker
    const icon = L.divIcon({
      html: `<div class="map-pin">${label}</div>`,
      iconSize: null, iconAnchor: [0, 14], className: "",
    });
    L.marker(coords, { icon })
      .addTo(map)
      .bindPopup(`<b>${r.name}</b><br/>${r.address}${mins !== null ? `<br/>🚶 ${mins} Minuten zu Fuß` : ""}`);

    // Seitenleiste aktualisieren
    const el = document.getElementById(`wt-${r.id}`);
    if (el) {
      el.textContent = mins !== null ? `${mins} min` : "–";
      el.classList.remove("loading");
    }
  }

  // Karte auf alle Marker zoomen
  if (bounds.length > 1) map.fitBounds(bounds, { padding: [40, 40] });
}

// ── Hilfsfunktionen ──────────────────────────
function todayDayName() {
  return DAY_ORDER[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1] ?? "";
}

function formatUpdated(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString("de-AT", {
      weekday: "short", day: "numeric", month: "long",
      hour: "2-digit", minute: "2-digit"
    });
  } catch { return iso; }
}

function buildCard(r, today) {
  const hasDays  = r.days && r.days.length > 0;
  const hasImage = r.menu_image;

  const weekChip = r.week_label
    ? `<span class="week-chip">📅 ${r.week_label}</span>` : "";
  const priceNote = r.price_note
    ? `<span class="week-chip" style="background:var(--green-lt);color:var(--green)">💶 ${r.price_note}</span>` : "";
  const phone = r.phone
    ? `&nbsp;·&nbsp;<a href="tel:${r.phone}" style="color:var(--muted);text-decoration:none">${r.phone}</a>` : "";

  const headerHtml = `
    <div class="card-header">
      <div class="top-row">
        <h2><a href="${r.url}" target="_blank" rel="noopener">${r.name}</a></h2>
        <span class="cuisine-badge">${r.cuisine}</span>
      </div>
      <div class="card-address">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        ${r.address}${phone}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
        ${weekChip}${priceNote}
      </div>
    </div>`;

  const hasPdf   = r.menu_pdf;

  let bodyHtml = "";
  if (hasImage) {
    bodyHtml = `
      <div class="menu-image-wrap">
        <img src="${r.menu_image}" alt="Menükarte ${r.name}" loading="lazy" />
      </div>`;
  } else if (hasPdf) {
    bodyHtml = `
      <div class="menu-pdf-wrap">
        <embed class="menu-pdf-embed" src="${r.menu_pdf}" type="application/pdf" />
        <a class="menu-pdf-link" href="${r.menu_pdf}" target="_blank" rel="noopener">
          📄 Mittagsmenü als PDF öffnen
        </a>
      </div>`;
  } else if (hasDays) {
    const sorted = [...r.days].sort((a, b) =>
      DAY_ORDER.indexOf(a.day) - DAY_ORDER.indexOf(b.day));

    const dayBlocks = sorted.map(d => {
      const isToday = d.day === today;
      const items = d.items.map(item => {
        const price = item.price ? `<span class="price">${item.price}</span>` : "";
        return `<div class="menu-item"><span class="dish">${item.name}</span>${price}</div>`;
      }).join("");
      return `
        <div class="day-block${isToday ? " is-today" : ""}">
          <div class="day-name">${isToday ? '<span class="today-dot"></span>' : ""}${d.day}</div>
          <div class="menu-items">${items}</div>
        </div>`;
    }).join("");

    bodyHtml = `<div class="card-days">${dayBlocks}</div>`;
  } else {
    bodyHtml = `
      <div class="empty-state">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
        </svg>
        Menüplan noch nicht verfügbar.<br />
        Bitte direkt auf der <a href="${r.url}" target="_blank" rel="noopener">Website nachsehen</a>.
      </div>`;
  }

  return `<article class="card" id="card-${r.id}">${headerHtml}${bodyHtml}</article>`;
}

// ── Init ─────────────────────────────────────
async function init() {
  const loading   = document.getElementById("loading");
  const errorMsg  = document.getElementById("error-msg");
  const container = document.getElementById("restaurants");
  const weekBadge = document.getElementById("week-badge");
  const updLabel  = document.getElementById("updated-label");
  const todayBanner = document.getElementById("today-banner");

  try {
    const res  = await fetch("menus.json?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    const today = todayDayName();

    weekBadge.textContent = data.week || "KW –";
    updLabel.textContent  = "Aktualisiert: " + formatUpdated(data.updated);

    const dateStr = new Date().toLocaleDateString("de-AT", {weekday:"long", day:"numeric", month:"long"});
    todayBanner.textContent = `📅 Heute ist ${dateStr}`;
    todayBanner.style.display = "block";

    // Karten-Kachel zuerst, dann Restaurants
    container.innerHTML =
      buildMapCard(data.restaurants) +
      data.restaurants.map(r => buildCard(r, today)).join("");

    loading.style.display   = "none";
    container.style.display = "grid";

    // Karte initialisieren (nach DOM-Render)
    requestAnimationFrame(() => initMap(data.restaurants));

  } catch (err) {
    console.error(err);
    loading.style.display  = "none";
    errorMsg.style.display = "block";
  }
}

init();
</script>
</body>
</html>
